<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Takasay404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFB6D9 0%, #C7CEEA 50%, #B5EAD7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(45, 27, 78, 0.15);
            max-width: 600px;
            animation: slideUp 0.6s ease-out;
        }

        h1 {
            font-size: 3em;
            color: #2D1B4E;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFB6D9, #C7CEEA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.2em;
            color: #4A4A4A;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            padding: 15px 35px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            border: 2px solid #FFB6D9;
        }

        .btn-birthday {
            background: linear-gradient(135deg, #FFB6D9, #C7CEEA);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 182, 217, 0.3);
        }

        .btn-birthday:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 182, 217, 0.4);
        }

        .btn-todo {
            background: linear-gradient(135deg, #C7CEEA, #B5EAD7);
            color: white;
            box-shadow: 0 10px 25px rgba(199, 206, 234, 0.3);
        }

        .btn-todo:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(199, 206, 234, 0.4);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .container {
                padding: 40px 20px;
            }

            .links {
                flex-direction: column;
            }

            a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome!</h1>
        <p>Choose what you want to explore:</p>
        <div class="links">
            <a href="birthday.html" class="btn-birthday">🎂 Birthday Salsabila</a>
            <a href="todo.html" class="btn-todo">✨ Todo List</a>
        </div>
    </div>
</body>
</html>
