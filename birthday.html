<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulang Tahun Salsabila</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .heart {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff3366;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff3366, 0 0 30px #ff1744, 0 0 45px #ff3366;
            animation: float 6s infinite ease-in-out, pulse 1.5s infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff3366;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff3366, 0 0 30px #ff1744, 0 0 45px #ff3366;
        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {
            left: 15px;
            top: -8px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
        }

        .title {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff3366, 0 0 40px #ff1744;
            animation: glow 2s ease-in-out infinite;
            letter-spacing: 2px;
        }

        .name {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(45deg, #ff3366, #ff69b4, #ff3366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px #ff3366;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite;
        }

        .message {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ff69b4;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1744;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        .neon-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #ff3366, transparent);
            opacity: 0.5;
            animation: moveLine 3s infinite linear;
        }

        @keyframes moveLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #ff3366, 0 0 40px #ff1744; }
            50% { text-shadow: 0 0 30px #ff3366, 0 0 60px #ff1744, 0 0 80px #ff69b4; }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .wish {
            font-size: 1.2em;
            margin-top: 40px;
            color: #ff69b4;
            text-shadow: 0 0 10px #ff69b4;
            line-height: 1.8;
            max-width: 500px;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="neon-lines" id="neonLines"></div>
        <div class="hearts-container" id="heartsContainer"></div>
        
        <div class="content">
            <div class="title">🎂 SELAMAT ULANG TAHUN 🎂</div>
            <div class="name">SALSABILA</div>
            <div class="message">✨ Semoga Hari Istimewa Ini Penuh Kebahagiaan ✨</div>
            <div class="wish">
                <p>Semoga tahun ini membawa berkah, kebahagiaan,</p>
                <p>dan segala hal indah dalam hidupmu.</p>
                <p style="margin-top: 20px; font-size: 1.1em; color: #ff3366;">💕 Sehat Selalu! 💕</p>
            </div>
        </div>
    </div>

    <script>
        // Membuat hati di seluruh layar
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartCount = 50;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                
                const randomX = Math.random() * 100;
                const randomY = Math.random() * 100;
                const randomDelay = Math.random() * 6;
                const randomDuration = 5 + Math.random() * 4;

                heart.style.left = randomX + '%';
                heart.style.top = randomY + '%';
                heart.style.animationDelay = randomDelay + 's';
                heart.style.animationDuration = randomDuration + 's';
                heart.style.opacity = Math.random() * 0.5 + 0.3;

                container.appendChild(heart);
            }
        }

        // Membuat garis neon
        function createNeonLines() {
            const container = document.getElementById('neonLines');
            const lineCount = 15;

            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'line';
                
                const randomX = Math.random() * window.innerWidth;
                const randomWidth = 2 + Math.random() * 4;
                const randomHeight = 100 + Math.random() * 300;
                const randomDuration = 3 + Math.random() * 4;
                const randomDelay = Math.random() * 5;

                line.style.left = randomX + 'px';
                line.style.width = randomWidth + 'px';
                line.style.height = randomHeight + 'px';
                line.style.animationDuration = randomDuration + 's';
                line.style.animationDelay = randomDelay + 's';

                container.appendChild(line);
            }
        }

        // Membuat bintang
        function createStars() {
            const container = document.getElementById('heartsContainer');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'stars';
                
                const randomX = Math.random() * 100;
                const randomY = Math.random() * 100;
                const randomDelay = Math.random() * 3;

                star.style.left = randomX + '%';
                star.style.top = randomY + '%';
                star.style.animation = `pulse ${1 + Math.random() * 2}s infinite`;
                star.style.animationDelay = randomDelay + 's';

                container.appendChild(star);
            }
        }

        // Jalankan semua fungsi
        createHearts();
        createNeonLines();
        createStars();
    </script>
</body>
</html>
